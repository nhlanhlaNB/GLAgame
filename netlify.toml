[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/deepseek/explain"
  to = "/.netlify/functions/deepseek-explain"
  status = 200

[[redirects]]
  from = "/api/scoring/explain"
  to = "/.netlify/functions/scoring-explain"
  status = 200

[[redirects]]
  from = "/game"
  to = "/game/index.html"
  status = 200

[[redirects]]
  from = "/game/*"
  to = "/game/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/game/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/game/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
